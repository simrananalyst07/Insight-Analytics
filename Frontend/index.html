<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Collection</title>
    <style>
        /* RESET & BASICS */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f0f0; /* Light Grey Background typical of App backgrounds */
            color: #333;
            line-height: 1.5;
        }

        /* HEADER */
        header {
            background: #fff;
            padding: 20px 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #E60023; /* Pinterest Red */
            letter-spacing: -1px;
            text-decoration: none;
        }

        /* MASONRY GRID LAYOUT */
        .masonry-grid {
            display: column;
            column-count: 4; /* Default: 4 columns */
            column-gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* CARD STYLING */
        .pin-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px; /* Space between vertical items */
            break-inside: avoid; /* Prevents card from splitting across columns */
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            position: relative;
        }

        .pin-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }

        /* IMAGE STYLING */
        .pin-image {
            width: 100%;
            display: block;
            height: auto; /* Maintains aspect ratio */
            object-fit: cover;
        }

        /* CONTENT AREA */
        .pin-content {
            padding: 15px;
        }

        .pin-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .pin-price {
            font-size: 14px;
            font-weight: 600;
            color: #767676;
            margin-bottom: 10px;
        }

        /* OVERLAY BUTTONS (Save & Link) */
        .save-button {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #E60023;
            color: white;
            padding: 10px 20px;
            border-radius: 24px;
            font-weight: 700;
            font-size: 14px;
            opacity: 0; /* Hidden by default */
            transition: opacity 0.2s ease;
            border: none;
            cursor: pointer;
        }

        .pin-card:hover .save-button {
            opacity: 1; /* Visible on hover */
        }

        /* RESPONSIVE COLUMNS */
        @media (max-width: 1100px) { .masonry-grid { column-count: 3; } }
        @media (max-width: 800px)  { .masonry-grid { column-count: 2; padding: 15px; } }
        @media (max-width: 500px)  { .masonry-grid { column-count: 1; } }

    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <a href="#" class="logo">Pinterest</a>
    </header>

    <!-- GRID CONTAINER -->
    <div class="masonry-grid">

            <button class="save-button">Save</button>
